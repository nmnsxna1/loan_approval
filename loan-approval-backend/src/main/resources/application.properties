# Server
server.port=8080

# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/loan_approval_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47
app.jwt.expiration-ms=86400000

# File Upload
app.file.upload-dir=uploads
app.file.max-file-size=20971520

# LLM / AI (now configured via llm.json at project root)
# Edit llm.json to change provider, model, URL, key, and timeout.
# API keys can also be set via env vars: LLM_GEMINI_API_KEY, LLM_OPENAI_API_KEY, etc.
# Legacy env var GEMINI_API_KEY still works as fallback.

# Mail (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=21MB

# Logging
logging.level.com.loan.approval=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
LOG_LEVEL=${LOG_LEVEL:INFO}
LOG_PATH=${LOG_PATH:../logs}
LOG_LEVEL_CONTROLLER=${LOG_LEVEL_CONTROLLER:INFO}
LOG_LEVEL_SERVICE=${LOG_LEVEL_SERVICE:INFO}
LOG_LEVEL_SECURITY=${LOG_LEVEL_SECURITY:INFO}
