# ============================================================
# Loan Approval System - Spring Boot Backend Configuration
# ============================================================
# This file configures the Java Spring Boot backend application.
# Values with ${VAR:default} syntax can be overridden via
# environment variables or .env file.
# ============================================================


# ─── Server Configuration ──────────────────────────────────────
# The port the Spring Boot application will listen on.
# Can be overridden via environment variable: SERVER_PORT
server.port=8080


# ─── PostgreSQL Database Connection ────────────────────────────
# JDBC URL for connecting to the PostgreSQL database.
# Format: jdbc:postgresql://HOST:PORT/DATABASE_NAME
# Override via env vars: DB_HOST, DB_PORT, DB_NAME
spring.datasource.url=jdbc:postgresql://localhost:5432/loan_approval_db

# Database credentials (can be overridden via env vars: DB_USERNAME, DB_PASSWORD)
spring.datasource.username=postgres
spring.datasource.password=1234

# PostgreSQL JDBC driver class (included via pom.xml dependency)
spring.datasource.driver-class-name=org.postgresql.Driver


# ─── JPA / Hibernate Configuration ─────────────────────────────
# Controls how Hibernate manages database schema
# Values: update, create, create-drop, validate, none
#   update     - Auto-update schema to match entities (development)
#   validate   - Only validate schema matches entities (production)
#   none       - No schema management (production)
spring.jpa.hibernate.ddl-auto=update

# Set to true to log all SQL queries (useful for debugging)
# Override via env var: LOG_LEVEL_SQL
spring.jpa.show-sql=false

# Hibernate PostgreSQL dialect for optimized queries
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Format SQL output for better readability when logging
spring.jpa.properties.hibernate.format_sql=true


# ─── JWT (JSON Web Token) Authentication ───────────────────────
# Secret key for signing JWT tokens (REQUIRED)
# Must be a Base64-encoded HMAC-SHA key (at least 256 bits)
# Generate using: openssl rand -base64 32
# NEVER use the default secret in production!
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47

# JWT token expiration time in milliseconds
# 86400000 ms = 24 hours
# 3600000 ms  = 1 hour
# 604800000 ms = 7 days
app.jwt.expiration-ms=86400000


# ─── File Upload Configuration ─────────────────────────────────
# Directory to store uploaded PDF files (relative to project root)
app.file.upload-dir=uploads

# Maximum file size for individual uploads (in bytes)
# 20971520 bytes = 20 MB
app.file.max-file-size=20971520


# ─── LLM / AI Provider Configuration ───────────────────────────
# AI provider details (provider, model, URL, key, timeout) are
# now configured via llm.json at the project root directory.
# See llm.json.example for documentation on all available options.
#
# API keys can be overridden via environment variables:
#   LLM_GEMINI_API_KEY       - For Google Gemini provider
#   LLM_OPENAI_API_KEY       - For OpenAI provider
#   LLM_ANTHROPIC_API_KEY    - For Anthropic/Claude provider
#   LLM_API_KEY              - Generic fallback for any provider
#   GEMINI_API_KEY           - Legacy fallback (Gemini only)


# ─── Email (SMTP) Configuration ────────────────────────────────
# SMTP server hostname (override via env var: MAIL_HOST)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}

# SMTP server port (override via env var: MAIL_PORT)
# 587 = STARTTLS, 465 = SSL, 25 = plain
spring.mail.port=${MAIL_PORT:587}

# SMTP username - usually a full email address (override via env var: MAIL_USERNAME)
# For Gmail, use your full email address
spring.mail.username=${MAIL_USERNAME:}

# SMTP password or App Password (override via env var: MAIL_PASSWORD)
# For Gmail with 2FA, generate an App Password at:
# https://myaccount.google.com/apppasswords
spring.mail.password=${MAIL_PASSWORD:}

# Enable SMTP authentication (required for most providers)
spring.mail.properties.mail.smtp.auth=true

# Enable STARTTLS for secure connections
spring.mail.properties.mail.smtp.starttls.enable=true


# ─── Multipart File Upload Settings ────────────────────────────
# Enable multipart upload support
spring.servlet.multipart.enabled=true

# Maximum size of a single uploaded file
spring.servlet.multipart.max-file-size=20MB

# Maximum size of the entire upload request (includes form fields)
spring.servlet.multipart.max-request-size=21MB


# ─── Logging Configuration ─────────────────────────────────────
# Application-wide log level
# Available: TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF
# Override via env var: LOG_LEVEL
logging.level.com.loan.approval=INFO

# Spring Security log level (reduces noise from security filters)
logging.level.org.springframework.security=WARN

# Hibernate SQL logging (override via env var: LOG_LEVEL_SQL)
# Set to DEBUG to see SQL queries
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}

# General log level (environment variable override)
LOG_LEVEL=${LOG_LEVEL:INFO}
LOG_PATH=${LOG_PATH:../logs}

# Module-specific log level overrides
LOG_LEVEL_CONTROLLER=${LOG_LEVEL_CONTROLLER:INFO}
LOG_LEVEL_SERVICE=${LOG_LEVEL_SERVICE:INFO}
LOG_LEVEL_SECURITY=${LOG_LEVEL_SECURITY:INFO}
